<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elektronika — Zápisky &amp; vzorové příklady</title>
<meta name="description" content="Studijní zápisky z elektroniky a elektrotechniky pro Internet věcí: kondenzátory, cívky, Ohmův zákon, Kirchhoff, baterie, elektrostatika a víc — včetně vzorových příkladů s řešením.">
<meta name="theme-color" content="#0f1117">
<meta property="og:title" content="Elektronika — Zápisky &amp; vzorové příklady">
<meta property="og:description" content="Interaktivní studijní materiál z elektrotechniky s vzorovými příklady a řešením.">
<meta property="og:type" content="website">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230f1117'/%3E%3Ctext x='50' y='52' font-size='58' text-anchor='middle' dominant-baseline='central'%3E%E2%9A%A1%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --surface2: #1e2336;
    --border: #2a2f40;
    --text: #e8ecf4;
    --muted: #7a8099;
    --c1: #4fc3f7;
    --c2: #81c784;
    --c3: #ffb74d;
    --c4: #f06292;
    --c5: #ffd54f;
    --c6: #ce93d8;
    --c7: #80deea;
    --c8: #ef9a9a;
    --c9: #9fa8da;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Sora', sans-serif;
    min-height: 100vh;
    padding: 2rem 1rem 5rem;
  }
  header { text-align: center; margin-bottom: 2.5rem; }
  header .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }
  header h1 {
    font-size: clamp(1.8rem, 5vw, 2.8rem);
    font-weight: 700;
    background: linear-gradient(135deg, #4fc3f7, #ce93d8, #ffd54f);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.2;
  }
  header p { margin-top: 0.6rem; color: var(--muted); font-size: 0.88rem; }

  .nav {
    display: flex; flex-wrap: wrap; gap: 0.45rem;
    justify-content: center; margin-bottom: 2.5rem;
  }
  .nav button {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 0.38rem 0.85rem;
    border-radius: 999px;
    font-family: 'Sora', sans-serif;
    font-size: 0.76rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .nav button:hover, .nav button.active { color: var(--text); border-color: currentColor; }

  /* Toolbar: search + akce */
  .toolbar {
    max-width: 920px; margin: 0 auto 1.6rem;
    display: flex; flex-wrap: wrap; gap: 0.6rem; align-items: center;
  }
  .search {
    flex: 1; min-width: 200px; position: relative;
  }
  .search input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Sora', sans-serif;
    font-size: 0.86rem;
    padding: 0.6rem 0.9rem 0.6rem 2.2rem;
    border-radius: 10px;
    transition: border-color 0.2s;
  }
  .search input:focus { outline: none; border-color: var(--c1); }
  .search input::placeholder { color: var(--muted); }
  .search::before {
    content: "⌕"; position: absolute; left: 0.8rem; top: 50%;
    transform: translateY(-50%); color: var(--muted); font-size: 1rem;
  }
  .toolbar .act {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 0.6rem 0.9rem;
    border-radius: 10px;
    font-family: 'Sora', sans-serif;
    font-size: 0.78rem;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
    white-space: nowrap;
  }
  .toolbar .act:hover { color: var(--text); border-color: var(--muted); }
  .no-results {
    max-width: 920px; margin: 0 auto; text-align: center;
    color: var(--muted); font-size: 0.9rem; padding: 2rem 0; display: none;
  }

  /* Scroll-to-top */
  .to-top {
    position: fixed; bottom: 1.4rem; right: 1.4rem;
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); font-size: 1.1rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.25s, transform 0.2s;
    z-index: 50;
  }
  .to-top.show { opacity: 1; pointer-events: auto; }
  .to-top:hover { transform: translateY(-2px); border-color: var(--muted); }

  mark {
    background: rgba(255,213,79,0.28); color: var(--text);
    border-radius: 3px; padding: 0 1px;
  }

  /* Legenda veličin */
  .legend {
    display: grid; grid-template-columns: max-content 1fr;
    gap: 0.4rem 1.1rem; align-items: baseline;
    margin: 0.7rem 0; padding: 0.95rem 1.1rem;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border); border-radius: 10px;
  }
  .legend dt {
    font-family: 'JetBrains Mono', monospace; font-weight: 700;
    font-size: 0.84rem; color: var(--text); white-space: nowrap;
  }
  .legend dd {
    color: var(--muted); font-size: 0.82rem; line-height: 1.5; margin: 0;
  }
  .legend dd b { color: #c8cedf; font-weight: 600; }
  .t1 .legend dt { color: var(--c1); }
  .t2 .legend dt { color: var(--c2); }
  .t3 .legend dt { color: var(--c3); }
  .t4 .legend dt { color: var(--c4); }
  .t5 .legend dt { color: var(--c5); }
  .t6 .legend dt { color: var(--c6); }
  .t7 .legend dt { color: var(--c7); }
  .t8 .legend dt { color: var(--c8); }
  .t9 .legend dt { color: var(--c9); }

  /* Převodník jednotek */
  .converter {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.1rem; margin: 0.7rem 0;
  }
  .converter-row {
    display: flex; flex-wrap: wrap; gap: 0.55rem; align-items: center;
  }
  .converter input, .converter select {
    background: var(--bg); border: 1px solid var(--border); color: var(--text);
    font-family: 'JetBrains Mono', monospace; font-size: 0.84rem;
    padding: 0.5rem 0.6rem; border-radius: 8px; cursor: pointer;
  }
  .converter input { width: 120px; cursor: text; }
  .converter input:focus, .converter select:focus { outline: none; border-color: var(--c9); }
  .converter .arrow { color: var(--muted); font-size: 1.15rem; }
  .conv-result {
    margin-top: 0.95rem; padding: 0.8rem 1rem;
    background: rgba(159,168,218,0.1); border-radius: 8px;
    font-family: 'JetBrains Mono', monospace; font-size: 0.98rem;
    color: var(--c9); font-weight: 700; word-break: break-word;
  }

  /* Tabulky jednotek */
  .utable {
    width: 100%; border-collapse: collapse; margin: 0.7rem 0; font-size: 0.84rem;
  }
  .utable th, .utable td {
    text-align: left; padding: 0.5rem 0.7rem; border-bottom: 1px solid var(--border);
  }
  .utable th {
    color: var(--muted); font-family: 'JetBrains Mono', monospace;
    font-size: 0.64rem; letter-spacing: 0.12em; text-transform: uppercase; font-weight: 400;
  }
  .utable td:first-child {
    font-family: 'JetBrains Mono', monospace; color: var(--c9); font-weight: 700;
  }
  .utable code {
    font-family: 'JetBrains Mono', monospace; color: #c8cedf;
    background: rgba(255,255,255,0.05); padding: 0.05rem 0.35rem; border-radius: 4px;
  }

  .grid {
    max-width: 920px; margin: 0 auto;
    display: flex; flex-direction: column; gap: 1.4rem;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px; overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .card:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
  .card-header {
    display: flex; align-items: center; gap: 1rem;
    padding: 1.1rem 1.4rem; cursor: pointer;
    border-bottom: 1px solid transparent; transition: border-color 0.2s;
  }
  .card.open .card-header { border-color: var(--border); }
  .card-icon {
    width: 42px; height: 42px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem; flex-shrink: 0;
  }
  .card-title { flex: 1; }
  .card-title h2 { font-size: 1rem; font-weight: 600; }
  .card-title span { font-size: 0.74rem; color: var(--muted); }
  .chevron { color: var(--muted); transition: transform 0.3s; font-size: 1rem; }
  .card.open .chevron { transform: rotate(180deg); }
  .card-body { display: none; padding: 1.5rem; }
  .card.open .card-body { display: block; }

  /* Sections inside card */
  .section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 1.4rem 0 0.6rem;
    padding-bottom: 0.4rem;
    border-bottom: 1px solid var(--border);
  }
  .section-label:first-child { margin-top: 0; }

  .card-body p {
    line-height: 1.75; color: #c8cedf;
    font-size: 0.88rem; margin-bottom: 0.75rem;
  }
  .card-body p:last-child { margin-bottom: 0; }
  .card-body ul {
    list-style: none; margin: 0.5rem 0 0.75rem 0;
  }
  .card-body ul li {
    font-size: 0.88rem; color: #c8cedf;
    line-height: 1.65; padding: 0.18rem 0 0.18rem 1.2rem;
    position: relative;
  }
  .card-body ul li::before {
    content: "→";
    position: absolute; left: 0;
    color: var(--muted); font-size: 0.78rem;
  }

  .formula {
    background: rgba(255,255,255,0.04);
    border-left: 3px solid;
    border-radius: 0 8px 8px 0;
    padding: 0.65rem 1rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.92rem;
    margin: 0.7rem 0;
    display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap;
  }
  .formula .f-label {
    font-size: 0.68rem; color: var(--muted);
    font-family: 'Sora', sans-serif; min-width: 70px;
  }
  .formula .f-eq { flex: 1; }
  .formula .f-desc {
    font-size: 0.7rem; color: var(--muted);
    font-family: 'Sora', sans-serif; text-align: right;
  }

  .rule-box {
    border: 1px solid var(--border); border-radius: 10px;
    padding: 1rem; margin: 0.7rem 0;
  }
  .rule-box h3 { font-size: 0.84rem; font-weight: 600; margin-bottom: 0.5rem; }

  .tip {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 0.65rem 1rem;
    font-size: 0.81rem; color: var(--muted); margin-top: 0.8rem;
  }
  .tip::before { content: "💡 "; }

  .tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.8rem; }
  .tag {
    background: rgba(255,255,255,0.06); border-radius: 6px;
    padding: 0.18rem 0.55rem; font-size: 0.7rem; color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
  }

  /* Examples */
  .example {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin: 0.7rem 0;
    overflow: hidden;
  }
  .example-q {
    padding: 0.9rem 1rem;
    font-size: 0.86rem;
    color: #d0d6e8;
    line-height: 1.6;
  }
  .example-q strong { font-weight: 600; }
  .example-toggle {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: none; border-top: 1px solid var(--border);
    color: var(--muted); font-family: 'Sora', sans-serif;
    font-size: 0.78rem; padding: 0.55rem 1rem;
    cursor: pointer; text-align: left;
    transition: background 0.2s, color 0.2s;
    display: flex; align-items: center; gap: 0.5rem;
  }
  .example-toggle:hover { background: rgba(255,255,255,0.07); color: var(--text); }
  .example-toggle .arr { transition: transform 0.25s; }
  .example-toggle.shown .arr { transform: rotate(90deg); }
  .example-solution {
    display: none;
    padding: 0.9rem 1rem;
    border-top: 1px solid var(--border);
    font-size: 0.85rem; color: #c8cedf; line-height: 1.7;
    font-family: 'JetBrains Mono', monospace;
    background: rgba(0,0,0,0.15);
  }
  .example-solution .step { margin-bottom: 0.35rem; }
  .example-solution .result {
    margin-top: 0.6rem; font-weight: 700;
    font-size: 0.9rem;
  }

  /* color themes */
  .t1 .card-icon { background: rgba(79,195,247,0.12); }
  .t1 .formula { border-color: var(--c1); }
  .t1 .example-toggle.shown, .t1 .example-result { color: var(--c1); }
  .t2 .card-icon { background: rgba(129,199,132,0.12); }
  .t2 .formula { border-color: var(--c2); }
  .t3 .card-icon { background: rgba(255,183,77,0.12); }
  .t3 .formula { border-color: var(--c3); }
  .t4 .card-icon { background: rgba(240,98,146,0.12); }
  .t4 .formula { border-color: var(--c4); }
  .t5 .card-icon { background: rgba(255,213,79,0.12); }
  .t5 .formula { border-color: var(--c5); }
  .t6 .card-icon { background: rgba(206,147,216,0.12); }
  .t6 .formula { border-color: var(--c6); }
  .t7 .card-icon { background: rgba(128,222,234,0.12); }
  .t7 .formula { border-color: var(--c7); }
  .t8 .card-icon { background: rgba(239,154,154,0.12); }
  .t8 .formula { border-color: var(--c8); }
  .t9 .card-icon { background: rgba(159,168,218,0.12); }
  .t9 .formula { border-color: var(--c9); }

  /* Filtr obtížnosti */
  .diff-filter {
    max-width: 920px; margin: 0 auto 1.6rem;
    display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center;
  }
  .diff-filter-label { font-size: 0.78rem; color: var(--muted); margin-right: 0.2rem; }
  .diff-chip {
    background: var(--surface); border: 1px solid var(--border); color: var(--muted);
    padding: 0.4rem 0.85rem; border-radius: 999px;
    font-family: 'Sora', sans-serif; font-size: 0.76rem; cursor: pointer;
    transition: color 0.2s, border-color 0.2s, background 0.2s;
    display: flex; align-items: center; gap: 0.45rem;
  }
  .diff-chip.d-lehke::before, .diff-chip.d-stredni::before, .diff-chip.d-tezke::before {
    content: ''; width: 8px; height: 8px; border-radius: 50%;
  }
  .diff-chip.d-lehke::before { background: var(--c2); }
  .diff-chip.d-stredni::before { background: var(--c3); }
  .diff-chip.d-tezke::before { background: var(--c8); }
  .diff-chip:hover { color: var(--text); border-color: var(--muted); }
  .diff-chip.active { color: var(--text); border-color: currentColor; background: var(--surface2); }

  /* Hlavička příkladu + obtížnostní odznak */
  .ex-top {
    display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap;
    padding: 0.85rem 1rem 0.2rem;
  }
  .diff-badge {
    font-family: 'JetBrains Mono', monospace; font-size: 0.6rem;
    letter-spacing: 0.1em; text-transform: uppercase; font-weight: 700;
    padding: 0.22rem 0.6rem; border-radius: 999px; white-space: nowrap;
  }
  .diff-badge.d-lehke { background: rgba(129,199,132,0.16); color: var(--c2); }
  .diff-badge.d-stredni { background: rgba(255,183,77,0.16); color: var(--c3); }
  .diff-badge.d-tezke { background: rgba(239,154,154,0.16); color: var(--c8); }
  .ex-tag { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--muted); }
  .example .example-q { padding: 0.4rem 1rem 0.85rem; }

  /* Postup — číslované kroky */
  .example-solution .steps {
    margin: 0; padding: 0 0 0 1.5rem; list-style: decimal;
  }
  .example-solution .steps li {
    font-family: 'JetBrains Mono', monospace; font-size: 0.8rem;
    color: #c8cedf; line-height: 1.6; margin-bottom: 0.45rem; padding-left: 0.25rem;
  }
  .example-solution .steps li::marker { color: var(--muted); font-weight: 700; }
  .example-solution .result {
    margin-top: 0.8rem; padding-top: 0.7rem; border-top: 1px solid var(--border);
    color: var(--c2); font-weight: 700; font-size: 0.86rem;
    font-family: 'JetBrains Mono', monospace; line-height: 1.55;
  }

  /* Filtr obtížnosti — skrývání nevyhovujících příkladů */
  body[data-diff="lehke"]  .example:not([data-diff="lehke"]),
  body[data-diff="stredni"] .example:not([data-diff="stredni"]),
  body[data-diff="tezke"]  .example:not([data-diff="tezke"]) { display: none; }
</style>
</head>
<body>

<header>
  <div class="label">Internet věcí — Elektrotechnika</div>
  <h1>Zápisky & Vzorové příklady</h1>
  <p>Klikni na téma pro rozbalení · Příklady mají skryté řešení</p>
</header>

<div class="nav" id="nav"></div>

<div class="toolbar">
  <div class="search">
    <input type="search" id="search" placeholder="Hledat téma, vzorec, pojem…" autocomplete="off" aria-label="Hledat">
  </div>
  <button class="act" id="expandAll">Rozbalit vše</button>
  <button class="act" id="collapseAll">Sbalit vše</button>
</div>

<div class="diff-filter" id="diffFilter">
  <span class="diff-filter-label">Obtížnost příkladů:</span>
  <button class="diff-chip active" data-diff="all">Vše</button>
  <button class="diff-chip d-lehke" data-diff="lehke">Lehké</button>
  <button class="diff-chip d-stredni" data-diff="stredni">Střední</button>
  <button class="diff-chip d-tezke" data-diff="tezke">Těžké</button>
</div>

<div class="grid" id="grid"></div>
<div class="no-results" id="noResults">Nic nenalezeno — zkus jiný výraz.</div>

<button class="to-top" id="toTop" aria-label="Nahoru">↑</button>

<script src="examples-data.js"></script>
<script>
const DIFF_LABEL = { lehke: 'Lehké', stredni: 'Střední', tezke: 'Těžké' };
function esc(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
let exSeq = 0;
function renderExamples(topicId) {
  const list = (window.exData && window.exData[topicId]) || [];
  return list.map(e => {
    const id = 'st-' + (++exSeq);
    const parts = e.title.split(/\s+—\s+/);
    const tag = parts.shift();
    const sub = parts.join(' — ');
    const steps = e.steps.map(s => '<li>' + esc(s) + '</li>').join('');
    return `
    <div class="example" data-diff="${e.diff}">
      <div class="ex-top">
        <span class="diff-badge d-${e.diff}">${DIFF_LABEL[e.diff] || ''}</span>
        <span class="ex-tag">${esc(tag)}${sub ? ' · ' + esc(sub) : ''}</span>
      </div>
      <div class="example-q">${esc(e.q)}</div>
      <button class="example-toggle" onclick="toggleStep(this,'${id}')">
        <span class="arr">▶</span> Zobrazit postup
      </button>
      <div class="example-solution" id="${id}">
        <ol class="steps">${steps}</ol>
        <div class="result">✅ Výsledek: ${esc(e.result)}</div>
      </div>
    </div>`;
  }).join('');
}
function toggleStep(btn, id) {
  const sol = document.getElementById(id);
  const shown = sol.style.display === 'block';
  sol.style.display = shown ? 'none' : 'block';
  btn.classList.toggle('shown', !shown);
  btn.childNodes[1].textContent = shown ? ' Zobrazit postup' : ' Skrýt postup';
}

function formatNum(n) {
  if (!isFinite(n)) return '—';
  if (n === 0) return '0';
  const abs = Math.abs(n);
  if (abs >= 1e13 || abs < 1e-9) {
    return n.toExponential(2).replace(/e([+-]?\d+)/, (m, e) => ' · 10^' + e.replace('+', ''));
  }
  return parseFloat(n.toPrecision(7)).toLocaleString('cs-CZ');
}

function convertUnit() {
  const valEl = document.getElementById('conv-val');
  const fromEl = document.getElementById('conv-from');
  const toEl = document.getElementById('conv-to');
  const unitEl = document.getElementById('conv-unit');
  const out = document.getElementById('conv-result');
  if (!valEl || !out) return;
  const val = parseFloat(valEl.value);
  if (isNaN(val)) { out.textContent = '— zadej číslo —'; return; }
  const from = parseInt(fromEl.value, 10);
  const to = parseInt(toEl.value, 10);
  const unit = unitEl.value;
  const fromSym = fromEl.selectedOptions[0].dataset.sym || '';
  const toSym = toEl.selectedOptions[0].dataset.sym || '';
  const result = val * Math.pow(10, from - to);

<div class="section-label">Základy</div>
<p><strong style="color:var(--c6)">Elektrostatika</strong> studuje elektrické náboje v klidu a síly mezi nimi. Existují dva druhy elektrického náboje: <strong>kladný (+)</strong> a <strong>záporný (−)</strong>. Jednotka náboje je <strong>coulomb [C]</strong>. Elementární náboj elektronu: e = 1,6 × 10⁻¹⁹ C.</p>
<p>Základní pravidlo: <em>stejné náboje se odpuzují, různé náboje se přitahují.</em></p>

<div class="section-label">Coulombův zákon</div>
<p>Popisuje sílu mezi dvěma bodovými náboji. Síla klesá s druhou mocninou vzdálenosti (jako gravitace, ale mnohem silnější).</p>
<div class="formula"><span class="f-label">Coulomb:</span><span class="f-eq">F = k · |Q₁ · Q₂| / r²</span><span class="f-desc">Newton [N]</span></div>
<p><strong>Coulombova konstanta:</strong> k = 1/(4πε₀) ≈ 9 × 10⁹ N·m²/C²</p>
<p><strong>Permitivita vakua:</strong> ε₀ ≈ 8,85 × 10⁻¹² F/m</p>

<div class="section-label">Elektrické pole</div>
<p>Elektrické pole E je prostor, ve kterém náboj pociťuje sílu. Vizualizuje se pomocí <em>siločar</em> — vychází z kladných nábojů, vstupují do záporných. Čím hustší siločáry, tím silnější pole.</p>
<div class="formula"><span class="f-label">Intenzita pole:</span><span class="f-eq">E = F / q = k · Q / r²</span><span class="f-desc">V/m nebo N/C</span></div>
<div class="formula"><span class="f-label">Homogenní pole:</span><span class="f-eq">E = U / d</span><span class="f-desc">mezi rovnob. deskami</span></div>

<div class="section-label">Elektrický potenciál a napětí</div>
<p><strong>Elektrický potenciál φ</strong> je "výška" v elektrickém poli — energie, kterou má jednotkový náboj v daném místě. Napětí U je rozdíl potenciálů mezi dvěma body: U = φ₁ − φ₂.</p>
<div class="formula"><span class="f-label">Potenciál:</span><span class="f-eq">φ = k · Q / r</span><span class="f-desc">Volt [V]</span></div>

<ul>

  <li><strong>Izolant (dielektrikum)</strong> — náboje se nemohou volně pohybovat, ale molekuly se polarizují</li>

<p><strong>ESD (Electrostatic Discharge)</strong> — výboj statické elektřiny může zničit citlivé součástky. Lidské tělo může nést náboj tisíců voltů — jemné MOSFET tranzistory a mikrochipy se snadno poškodí.</p>

allBtn.textContent = '📚 Vše';
allBtn.classList.add('active');
allBtn.onclick = () => {
  if (typeof search !== 'undefined') { search.value = ''; }
  document.querySelectorAll('.card').forEach(c => {
    c.style.display = '';
    if (c.dataset.raw && c.innerHTML !== c.dataset.raw) c.innerHTML = c.dataset.raw;
  });
  document.getElementById('noResults').style.display = 'none';
  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  allBtn.classList.add('active');
};
nav.appendChild(allBtn);

topics.forEach((t, i) => {
  const btn = document.createElement('button');
  btn.textContent = t.icon + ' ' + t.title;
  btn.style.setProperty('--hover-color', `var(${t.accentVar})`);
  btn.onclick = () => {
    if (typeof search !== 'undefined') { search.value = ''; }
    document.querySelectorAll('.card').forEach(c => {
      c.style.display = 'none';
      if (c.dataset.raw && c.innerHTML !== c.dataset.raw) c.innerHTML = c.dataset.raw;
    });
    const target = document.getElementById('card-' + t.id);
    target.style.display = '';
    target.classList.add('open');
    document.getElementById('noResults').style.display = 'none';
    document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  };
  nav.appendChild(btn);

  const card = document.createElement('div');
  card.className = 'card ' + t.theme;
  card.id = 'card-' + t.id;
  card.innerHTML = `
    <div class="card-header" onclick="this.parentElement.classList.toggle('open')">
      <div class="card-icon">${t.icon}</div>
      <div class="card-title">
        <h2>${t.title}</h2>
        <span>${t.sub}</span>
      </div>
      <span class="chevron">▾</span>
    </div>
    <div class="card-body">${t.body}</div>
  `;
  grid.appendChild(card);
  if (i === 0) card.classList.add('open');
});

/* ---- Inicializace převodníku ---- */
if (document.getElementById('conv-val')) convertUnit();

/* ---- Vyhledávání ---- */
const search = document.getElementById('search');
const noResults = document.getElementById('noResults');
const cards = [...document.querySelectorAll('.card')];
// uložíme původní text každé karty pro highlight
cards.forEach(c => c.dataset.raw = c.innerHTML);

function clearHighlight(card) {
  if (card.innerHTML !== card.dataset.raw) card.innerHTML = card.dataset.raw;
}

function runSearch(q) {
  q = q.trim().toLowerCase();
  let visible = 0;
  // při hledání zrušíme filtr z navigace
  if (q) {
    document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  }
  cards.forEach(card => {
    clearHighlight(card);
    const text = card.textContent.toLowerCase();
    const match = !q || text.includes(q);
    card.style.display = match ? '' : 'none';
    if (match) {
      visible++;
      if (q) {
        card.classList.add('open');
        highlight(card, q);
      }
    }
  });
  noResults.style.display = visible ? 'none' : 'block';
}

function highlight(card, q) {
  const walker = document.createTreeWalker(card, NodeFilter.SHOW_TEXT, {
    acceptNode(node) {
      if (!node.nodeValue.toLowerCase().includes(q)) return NodeFilter.FILTER_REJECT;
      const p = node.parentElement;
      if (p && (p.tagName === 'SCRIPT' || p.tagName === 'STYLE' || p.tagName === 'MARK')) return NodeFilter.FILTER_REJECT;
      return NodeFilter.FILTER_ACCEPT;
    }
  });
  const targets = [];
  while (walker.nextNode()) targets.push(walker.currentNode);
  targets.forEach(node => {
    const frag = document.createDocumentFragment();
    const parts = node.nodeValue.split(new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'ig'));
    parts.forEach(part => {
      if (part.toLowerCase() === q) {
        const m = document.createElement('mark');
        m.textContent = part;
        frag.appendChild(m);
      } else if (part) {
        frag.appendChild(document.createTextNode(part));
      }
    });
    node.parentNode.replaceChild(frag, node);
  });
}

let searchTimer;
search.addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => runSearch(search.value), 120);
});

/* ---- Rozbalit / sbalit vše ---- */
document.getElementById('expandAll').onclick = () => {
  cards.forEach(c => { if (c.style.display !== 'none') c.classList.add('open'); });
};
document.getElementById('collapseAll').onclick = () => {
  cards.forEach(c => c.classList.remove('open'));
};

/* ---- Filtr obtížnosti ---- */
document.querySelectorAll('.diff-chip').forEach(chip => {
  chip.onclick = () => {
    const d = chip.dataset.diff;
    document.querySelectorAll('.diff-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    if (d === 'all') {
      document.body.removeAttribute('data-diff');
    } else {
      document.body.setAttribute('data-diff', d);
      // otevři všechny viditelné karty, ať jsou příklady vidět napříč tématy
      cards.forEach(c => { if (c.style.display !== 'none') c.classList.add('open'); });
    }
  };
});

/* ---- Scroll nahoru ---- */
const toTop = document.getElementById('toTop');
window.addEventListener('scroll', () => {
  toTop.classList.toggle('show', window.scrollY > 400);
}, { passive: true });
toTop.onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });
</script>
