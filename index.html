<style>
  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --surface2: #1e2336;
    --border: #2a2f40;
    --text: #e8ecf4;
    --muted: #7a8099;
    --c1: #4fc3f7;
    --c2: #81c784;
    --c3: #ffb74d;
    --c4: #f06292;
    --c5: #ffd54f;
    --c6: #ce93d8;
    --c7: #80deea;
    --c8: #ef9a9a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Sora', sans-serif;
    min-height: 100vh;
    padding: 2rem 1rem 5rem;
  }
  header { text-align: center; margin-bottom: 2.5rem; }
  header .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }
  header h1 {
    font-size: clamp(1.8rem, 5vw, 2.8rem);
    font-weight: 700;
    background: linear-gradient(135deg, #4fc3f7, #ce93d8, #ffd54f);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.2;
  }
  header p { margin-top: 0.6rem; color: var(--muted); font-size: 0.88rem; }

  .nav {
    display: flex; flex-wrap: wrap; gap: 0.45rem;
    justify-content: center; margin-bottom: 2.5rem;
  }
  .nav button {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 0.38rem 0.85rem;
    border-radius: 999px;
    font-family: 'Sora', sans-serif;
    font-size: 0.76rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .nav button:hover, .nav button.active { color: var(--text); border-color: currentColor; }

  /* Toolbar: search + akce */
  .toolbar {
    max-width: 920px; margin: 0 auto 1.6rem;
    display: flex; flex-wrap: wrap; gap: 0.6rem; align-items: center;
  }
  .search {
    flex: 1; min-width: 200px; position: relative;
  }
  .search input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Sora', sans-serif;
    font-size: 0.86rem;
    padding: 0.6rem 0.9rem 0.6rem 2.2rem;
    border-radius: 10px;
    transition: border-color 0.2s;
  }
  .search input:focus { outline: none; border-color: var(--c1); }
  .search input::placeholder { color: var(--muted); }
  .search::before {
    content: "⌕"; position: absolute; left: 0.8rem; top: 50%;
    transform: translateY(-50%); color: var(--muted); font-size: 1rem;
  }
  .toolbar .act {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 0.6rem 0.9rem;
    border-radius: 10px;
    font-family: 'Sora', sans-serif;
    font-size: 0.78rem;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
    white-space: nowrap;
  }
  .toolbar .act:hover { color: var(--text); border-color: var(--muted); }
  .no-results {
    max-width: 920px; margin: 0 auto; text-align: center;
    color: var(--muted); font-size: 0.9rem; padding: 2rem 0; display: none;
  }

  /* Scroll-to-top */
  .to-top {
    position: fixed; bottom: 1.4rem; right: 1.4rem;
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); font-size: 1.1rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.25s, transform 0.2s;
    z-index: 50;
  }
  .to-top.show { opacity: 1; pointer-events: auto; }
  .to-top:hover { transform: translateY(-2px); border-color: var(--muted); }

  mark {
    background: rgba(255,213,79,0.28); color: var(--text);
    border-radius: 3px; padding: 0 1px;
  }

  /* Legenda veličin */
  .legend {
    display: grid; grid-template-columns: max-content 1fr;
    gap: 0.4rem 1.1rem; align-items: baseline;
    margin: 0.7rem 0; padding: 0.95rem 1.1rem;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border); border-radius: 10px;
  }
  .legend dt {
    font-family: 'JetBrains Mono', monospace; font-weight: 700;
    font-size: 0.84rem; color: var(--text); white-space: nowrap;
  }
  .legend dd {
    color: var(--muted); font-size: 0.82rem; line-height: 1.5; margin: 0;
  }
  .legend dd b { color: #c8cedf; font-weight: 600; }
  .t1 .legend dt { color: var(--c1); }
  .t2 .legend dt { color: var(--c2); }
  .t3 .legend dt { color: var(--c3); }
  .t4 .legend dt { color: var(--c4); }
  .t5 .legend dt { color: var(--c5); }
  .t6 .legend dt { color: var(--c6); }
  .t7 .legend dt { color: var(--c7); }
  .t8 .legend dt { color: var(--c8); }

  .grid {
    max-width: 920px; margin: 0 auto;
    display: flex; flex-direction: column; gap: 1.4rem;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px; overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .card:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
  .card-header {
    display: flex; align-items: center; gap: 1rem;
    padding: 1.1rem 1.4rem; cursor: pointer;
    border-bottom: 1px solid transparent; transition: border-color 0.2s;
  }
  .card.open .card-header { border-color: var(--border); }
  .card-icon {
    width: 42px; height: 42px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem; flex-shrink: 0;
  }
  .card-title { flex: 1; }
  .card-title h2 { font-size: 1rem; font-weight: 600; }
  .card-title span { font-size: 0.74rem; color: var(--muted); }
  .chevron { color: var(--muted); transition: transform 0.3s; font-size: 1rem; }
  .card.open .chevron { transform: rotate(180deg); }
  .card-body { display: none; padding: 1.5rem; }
  .card.open .card-body { display: block; }

  /* Sections inside card */
  .section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 1.4rem 0 0.6rem;
    padding-bottom: 0.4rem;
    border-bottom: 1px solid var(--border);
  }
  .section-label:first-child { margin-top: 0; }

  .card-body p {
    line-height: 1.75; color: #c8cedf;
    font-size: 0.88rem; margin-bottom: 0.75rem;
  }
  .card-body p:last-child { margin-bottom: 0; }
  .card-body ul {
    list-style: none; margin: 0.5rem 0 0.75rem 0;
  }
  .card-body ul li {
    font-size: 0.88rem; color: #c8cedf;
    line-height: 1.65; padding: 0.18rem 0 0.18rem 1.2rem;
    position: relative;
  }
  .card-body ul li::before {
    content: "→";
    position: absolute; left: 0;
    color: var(--muted); font-size: 0.78rem;
  }

  .formula {
    background: rgba(255,255,255,0.04);
    border-left: 3px solid;
    border-radius: 0 8px 8px 0;
    padding: 0.65rem 1rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.92rem;
    margin: 0.7rem 0;
    display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap;
  }
  .formula .f-label {
    font-size: 0.68rem; color: var(--muted);
    font-family: 'Sora', sans-serif; min-width: 70px;
  }
  .formula .f-eq { flex: 1; }
  .formula .f-desc {
    font-size: 0.7rem; color: var(--muted);
    font-family: 'Sora', sans-serif; text-align: right;
  }

  .rule-box {
    border: 1px solid var(--border); border-radius: 10px;

  }
  .rule-box h3 { font-size: 0.84rem; font-weight: 600; margin-bottom: 0.5rem; }

  .tip {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 0.65rem 1rem;
    font-size: 0.81rem; color: var(--muted); margin-top: 0.8rem;
  }
  .tip::before { content: "💡 "; }

  .tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.8rem; }
  .tag {
    background: rgba(255,255,255,0.06); border-radius: 6px;
    padding: 0.18rem 0.55rem; font-size: 0.7rem; color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
  }

  /* Examples */
  .example {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin: 0.7rem 0;
    overflow: hidden;
  }
  .example-q {
    padding: 0.9rem 1rem;
    font-size: 0.86rem;
    color: #d0d6e8;
    line-height: 1.6;
  }
  .example-q strong { font-weight: 600; }
  .example-toggle {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: none; border-top: 1px solid var(--border);
    color: var(--muted); font-family: 'Sora', sans-serif;
    font-size: 0.78rem; padding: 0.55rem 1rem;
    cursor: pointer; text-align: left;
    transition: background 0.2s, color 0.2s;
    display: flex; align-items: center; gap: 0.5rem;
  }
  .example-toggle:hover { background: rgba(255,255,255,0.07); color: var(--text); }
  .example-toggle .arr { transition: transform 0.25s; }
  .example-toggle.shown .arr { transform: rotate(90deg); }
  .example-solution {
    display: none;
    padding: 0.9rem 1rem;
    border-top: 1px solid var(--border);
    font-size: 0.85rem; color: #c8cedf; line-height: 1.7;
    font-family: 'JetBrains Mono', monospace;
    background: rgba(0,0,0,0.15);
  }
  .example-solution .step { margin-bottom: 0.35rem; }
  .example-solution .result {
    margin-top: 0.6rem; font-weight: 700;
    font-size: 0.9rem;
  }

  /* color themes */
  .t1 .card-icon { background: rgba(79,195,247,0.12); }
  .t1 .formula { border-color: var(--c1); }
  .t1 .example-toggle.shown, .t1 .example-result { color: var(--c1); }
  .t2 .card-icon { background: rgba(129,199,132,0.12); }
  .t2 .formula { border-color: var(--c2); }
  .t3 .card-icon { background: rgba(255,183,77,0.12); }
  .t3 .formula { border-color: var(--c3); }
  .t4 .card-icon { background: rgba(240,98,146,0.12); }
  .t4 .formula { border-color: var(--c4); }
  .t5 .card-icon { background: rgba(255,213,79,0.12); }
  .t5 .formula { border-color: var(--c5); }
  .t6 .card-icon { background: rgba(206,147,216,0.12); }
  .t6 .formula { border-color: var(--c6); }
  .t7 .card-icon { background: rgba(128,222,234,0.12); }
  .t7 .formula { border-color: var(--c7); }
  .t8 .card-icon { background: rgba(239,154,154,0.12); }

</style>

<body>

<header>
  <div class="label">Internet věcí — Elektrotechnika</div>
  <h1>Zápisky & Vzorové příklady</h1>
  <p>Klikni na téma pro rozbalení · Příklady mají skryté řešení</p>
</header>

<div class="nav" id="nav"></div>

<div class="toolbar">
  <div class="search">
    <input type="search" id="search" placeholder="Hledat téma, vzorec, pojem…" autocomplete="off" aria-label="Hledat">
  </div>
  <button class="act" id="expandAll">Rozbalit vše</button>
  <button class="act" id="collapseAll">Sbalit vše</button>
</div>

<div class="grid" id="grid"></div>
<div class="no-results" id="noResults">Nic nenalezeno — zkus jiný výraz.</div>

<button class="to-top" id="toTop" aria-label="Nahoru">↑</button>

<script>
function ex(q, steps, color) {
  const id = Math.random().toString(36).slice(2);
  const stepsHtml = steps.map(s => `<div class="step">${s}</div>`).join('');
  const last = steps[steps.length - 1];
  return `
    <div class="example">
      <div class="example-q">${q}</div>
      <button class="example-toggle" onclick="toggleEx(this,'sol-${id}')">
        <span class="arr">▶</span> Zobrazit řešení
      </button>
      <div class="example-solution" id="sol-${id}">${stepsHtml}</div>
    </div>`;
}

function toggleEx(btn, id) {
  const sol = document.getElementById(id);
  const shown = sol.style.display === 'block';
  sol.style.display = shown ? 'none' : 'block';
  btn.classList.toggle('shown', !shown);
  btn.childNodes[1].textContent = shown ? ' Zobrazit řešení' : ' Skrýt řešení';
}

const topics = [
  {
    id: "kondenzator", icon: "⚡", theme: "t1", accentVar: "--c1",
    title: "Kondenzátory", sub: "Ukládání elektrického náboje",
    body: `
<div class="section-label">Co to je</div>
<p><strong style="color:var(--c1)">Kondenzátor</strong> je elektronická součástka schopná ukládat elektrický náboj — a tím i energii — v elektrickém poli mezi dvěma vodivými deskami (elektrodami) oddělenými izolantem zvaným <em>dielektrikum</em>.</p>
<p>Při připojení napětí se na jedné desce hromadí kladný náboj, na druhé záporný. Čím větší napětí, tím víc náboje se uloží. Jakmile odpojíš zdroj, náboj zůstane — kondenzátor se chová jako krátkodobá baterie.</p>

<div class="section-label">Kapacita</div>
<p><strong>Kapacita C</strong> udává, kolik náboje kondenzátor pojme na jeden volt napětí. Jednotka je <strong>farad [F]</strong> — v praxi se používají mikrofarady (µF) nebo nanofarady (nF), protože farad je obrovská hodnota.</p>
<div class="formula"><span class="f-label">Kapacita:</span><span class="f-eq">C = Q / U</span><span class="f-desc">[F] = [C] / [V]</span></div>
<div class="formula"><span class="f-label">Energie:</span><span class="f-eq">E = ½ · C · U²</span><span class="f-desc">[J]</span></div>
<div class="formula"><span class="f-label">Náboj:</span><span class="f-eq">Q = C · U</span><span class="f-desc">[C] = coulomb</span></div>

<div class="section-label">Dielektrikum</div>
<p>Materiál mezi deskami ovlivňuje kapacitu — různé materiály mají různou <em>permitivitu</em> (ε). Vzduch ε ≈ 1, keramika nebo elektrolyt mají εᵣ desítky až tisíce. Proto elektrolytické kondenzátory mají obrovskou kapacitu při malém objemu.</p>
<div class="formula"><span class="f-label">Deskový kond.:</span><span class="f-eq">C = ε₀ · εᵣ · A / d</span><span class="f-desc">A = plocha desek, d = mezera</span></div>

<div class="section-label">Zapojení</div>
<ul>
  <li><strong>Sériové:</strong> 1/C = 1/C₁ + 1/C₂ — výsledná kapacita je <em>menší</em> než nejmenší článek, napětí se dělí</li>
  <li><strong>Paralelní:</strong> C = C₁ + C₂ — kapacity se sčítají, napětí je stejné na všech</li>
</ul>

<div class="section-label">Typy kondenzátorů</div>
<ul>
  <li><strong>Elektrolytické</strong> — velká kapacita (µF–mF), polarizované, nesmí se přepólovat</li>
  <li><strong>Keramické</strong> — malá kapacita (pF–nF), nepolarizované, rychlé, stabilní</li>
  <li><strong>Fóliové</strong> — audio aplikace, přesné, nízkoztrátové</li>
  <li><strong>Superkondenzátory (EDLC)</strong> — kapacita v Farádech, používané jako krátkodobá baterie</li>
</ul>

<div class="section-label">Chování v obvodu</div>
<p>Kondenzátor <strong>blokuje stejnosměrný proud (DC)</strong> ale <strong>propouští střídavý (AC)</strong>. Čím vyšší frekvence, tím lépe propouští. Reaktance kondenzátoru: X_C = 1 / (2π·f·C). V IoT se kondenzátory používají jako filtry napájení (odstranění šumu), decoupling u mikrokontrolérů, nebo v RC oscilátorech.</p>
<div class="tip">Při práci s elektrolytickými kondenzátory dávej pozor na polaritu — plus na plus! Přepólovaný elektrolytický kondenzátor může explodovat.</div>

<div class="section-label">Význam veličin</div>
<dl class="legend">
    <dt>C</dt><dd><b>kapacita</b> — farad [F]</dd>
    <dt>Q</dt><dd><b>elektrický náboj</b> — coulomb [C]</dd>
    <dt>U</dt><dd><b>napětí</b> — volt [V]</dd>
    <dt>E</dt><dd><b>energie</b> — joule [J]</dd>
    <dt>C₁, C₂</dt><dd><b>kapacity jednotlivých kondenzátorů</b> — [F]</dd>
    <dt>ε₀</dt><dd><b>permitivita vakua</b> — 8,85·10⁻¹² F/m</dd>
    <dt>εᵣ</dt><dd><b>relativní permitivita dielektrika</b> — bezrozměrná</dd>
    <dt>A</dt><dd><b>plocha desek</b> — [m²]</dd>
    <dt>d</dt><dd><b>vzdálenost desek</b> — [m]</dd>
    <dt>X_C</dt><dd><b>kapacitní reaktance</b> — [Ω]</dd>
    <dt>f</dt><dd><b>frekvence</b> — hertz [Hz]</dd>
  </dl>

<div class="section-label">Vzorové příklady</div>
${ex(
  '📝 <strong>Příklad 1:</strong> Kondenzátor má kapacitu C = 100 µF. Nabijeme ho na napětí U = 12 V. Jaký náboj je na něm uložen a jaká energie?',
  [
    'Zadáno: C = 100 µF = 100 × 10⁻⁶ F,  U = 12 V',
    'Náboj:  Q = C · U = 100×10⁻⁶ · 12 = 1,2 × 10⁻³ C = 1,2 mC',
    'Energie: E = ½ · C · U² = 0,5 · 100×10⁻⁶ · 144 = 7,2 × 10⁻³ J = 7,2 mJ',
    '✅ Výsledek: Q = 1,2 mC,  E = 7,2 mJ',
  ]
)}
${ex(
  '📝 <strong>Příklad 2:</strong> Kondenzátory C₁ = 10 µF a C₂ = 40 µF jsou zapojeny paralelně. Jaká je výsledná kapacita? A co při sériovém zapojení?',
  [
    'Paralelní: C = C₁ + C₂ = 10 + 40 = 50 µF',
    'Sériové:   1/C = 1/C₁ + 1/C₂ = 1/10 + 1/40 = 4/40 + 1/40 = 5/40',
    '           C = 40/5 = 8 µF',
    '✅ Paralelně: 50 µF  |  Sériově: 8 µF',
  ]
)}
<div class="tags"><span class="tag">farad [F]</span><span class="tag">dielektrikum</span><span class="tag">náboj Q</span><span class="tag">decoupling</span><span class="tag">reaktance</span></div>`
  },

  {
    id: "civky", icon: "🌀", theme: "t2", accentVar: "--c2",
    title: "Cívky & Magnetismus", sub: "Induktivita, magnetické pole, Faraday",
    body: `
<div class="section-label">Co to je</div>
<p><strong style="color:var(--c2)">Cívka (induktor)</strong> je vinutý vodič — většinou měděný drát navinutý na jádro (vzduch, ferit, železo). Při průchodu proudu vytváří magnetické pole, a naopak: změna magnetického pole v cívce <em>indukuje</em> elektrické napětí (Faradayův zákon).</p>
<p><strong>Magnetismus</strong> je projev pohybu elektrických nábojů. Každý magnet má dva póly: severní (N) a jižní (S). Stejné póly se odpuzují, různé přitahují. Magnetické pole si vizualizuj jako siločáry — vychází ze severu, vstupují na jihu.</p>

<div class="section-label">Induktivita</div>
<p><strong>Induktivita L</strong> vyjadřuje, jak dobře cívka "váže" magnetický tok. Závisí na počtu závitů, průřezu jádra a jeho materiálu. Jednotka je <strong>henry [H]</strong> — v praxi µH nebo mH.</p>
<div class="formula"><span class="f-label">Indukované U:</span><span class="f-eq">U = −L · (ΔI / Δt)</span><span class="f-desc">Volt [V]</span></div>
<div class="formula"><span class="f-label">Energie v poli:</span><span class="f-eq">E = ½ · L · I²</span><span class="f-desc">Jouly [J]</span></div>
<div class="formula"><span class="f-label">Induktivita:</span><span class="f-eq">L = (µ₀ · µᵣ · N² · A) / l</span><span class="f-desc">henry [H]</span></div>

<div class="section-label">Faradayův zákon elektromagnetické indukce</div>
<p>Pokud se mění magnetický tok Φ procházející cívkou, indukuje se v ní napětí. Čím rychleji se tok mění a čím více závitů, tím větší napětí. Znaménko minus říká (Lenzův zákon), že indukované napětí působí <em>proti příčině</em>, která ho způsobila.</p>
<div class="formula"><span class="f-label">Faraday:</span><span class="f-eq">U = −N · (ΔΦ / Δt)</span><span class="f-desc">N = počet závitů</span></div>

<div class="section-label">Zapojení cívek</div>
<ul>
  <li><strong>Sériové:</strong> L = L₁ + L₂ (induktivity se sčítají, jako odpory)</li>
  <li><strong>Paralelní:</strong> 1/L = 1/L₁ + 1/L₂</li>
</ul>

<div class="section-label">Chování v obvodu</div>
<p>Cívka <strong>propouští DC</strong> (stejnosměrný proud) a <strong>brání AC</strong> (střídavému proudu). Je to opačné chování než kondenzátor. Reaktance cívky: X_L = 2π·f·L. V kombinaci LC vznikají rezonanční obvody (ladění rádia, filtry).</p>
<p><strong>Elektromagnet</strong> = cívka s feromagnetickým jádrem (železo, ferit). Průchodem proudu vznikne silný magnet — relé, reproduktory, MRI přístroje.</p>
<p><strong>Transformátor</strong> = dvě cívky na společném jádře. Střídavé napětí na primární cívce indukuje napětí na sekundární. Poměr napětí = poměr počtu závitů.</p>
<div class="formula"><span class="f-label">Transformátor:</span><span class="f-eq">U₁/U₂ = N₁/N₂</span><span class="f-desc"></span></div>
<div class="tip">V IoT se cívky vyskytují v DC-DC konvertorech (buck/boost), bezdrátovém nabíjení (Qi standard) a RFID čtečkách.</div>

<p><strong style="color:var(--c4)">Kirchhoffovy zákony</strong> (Gustav Robert Kirchhoff, 1845) rozšiřují Ohmův zákon na složité obvody s více zdroji a větvemi, kde Ohmův zákon nestačí. Jsou dvě — pro uzly (proudy) a pro smyčky (napětí).</p>

  <p>Součet všech proudů <em>vstupujících</em> do uzlu se rovná součtu všech proudů <em>vystupujících</em> z uzlu. Elektrický náboj se nikde nehromadí ani neztrácí — zákon zachování náboje.</p>

<div class="rule-box">

function clearHighlight(card) {
  if (card.innerHTML !== card.dataset.raw) card.innerHTML = card.dataset.raw;
}

function runSearch(q) {
  q = q.trim().toLowerCase();
  let visible = 0;
  // při hledání zrušíme filtr z navigace
  if (q) {
    document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  }
  cards.forEach(card => {
    clearHighlight(card);
    const text = card.textContent.toLowerCase();
    const match = !q || text.includes(q);
    card.style.display = match ? '' : 'none';
    if (match) {
      visible++;
      if (q) {
        card.classList.add('open');
        highlight(card, q);
      }
    }
  });
  noResults.style.display = visible ? 'none' : 'block';
}

function highlight(card, q) {
  const walker = document.createTreeWalker(card, NodeFilter.SHOW_TEXT, {
    acceptNode(node) {
      if (!node.nodeValue.toLowerCase().includes(q)) return NodeFilter.FILTER_REJECT;
      const p = node.parentElement;
      if (p && (p.tagName === 'SCRIPT' || p.tagName === 'STYLE' || p.tagName === 'MARK')) return NodeFilter.FILTER_REJECT;
      return NodeFilter.FILTER_ACCEPT;
    }
  });
  const targets = [];
  while (walker.nextNode()) targets.push(walker.currentNode);
  targets.forEach(node => {
    const frag = document.createDocumentFragment();
    const parts = node.nodeValue.split(new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'ig'));
    parts.forEach(part => {
      if (part.toLowerCase() === q) {
        const m = document.createElement('mark');
        m.textContent = part;
        frag.appendChild(m);
      } else if (part) {
        frag.appendChild(document.createTextNode(part));
      }
    });
    node.parentNode.replaceChild(frag, node);
  });
}

const toTop = document.getElementById('toTop');
window.addEventListener('scroll', () => {
  toTop.classList.toggle('show', window.scrollY > 400);
}, { passive: true });
toTop.onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });
</script>
</body>
